<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>FlipHTML5 Downloader</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-group">
        <label for="url">URL</label>
        <input type="text" class='form-control' id="url-input">
    </div>
    <div class="form-group">
        <label for="page-from">Sayfa aralığı (boş = tüm sayfalar)</label>
        <div class="page-range-row">
            <input type="number" class="form-control" id="page-from" min="1" placeholder="Başlangıç">
            <span class="page-range-sep">–</span>
            <input type="number" class="form-control" id="page-to" min="1" placeholder="Bitiş">
        </div>
    </div>
    <button type="button" class="btn-success" id = 'download-button'>Download</button>
    <script src='view.js'></script>
</body>
</html>
